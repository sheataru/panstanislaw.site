<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>pan stanisław</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="pan.jpg" type="image/jpg">
</head>
<body>

  <div class="top-center">
    <img src="panstanislaw.png" alt="panstanisław.site" id="clickableImage">
  </div>
  <div class="welcome-text">
    <img src="dziendobry.gif" alt="dzien dobry fine shyts" id="welcomeImage">
  </div>
  <div class="panstanislaw">
    <img src="pan.jpg" alt="photo of pan stanisław" id="panImage">
  </div>
  <div class="polishcow">
    <img src="polishcow.gif" alt="polish cow" id="gifImage">
    <video src="NEVERKILLYOURSELF.mp4" controls></video>
  </div>
  <div class="geoffhunttext">
    <img src="geoffhunttext.png" alt="pan stanisławs best friend:" id="geoffhunttextImage">
  </div>
  <div class="geoffhunt">
    <img src="geoffhunt.jpg" alt="photo of pan stanisławs best friend" id="geoffhuntImage">
  </div>

  <audio id="soundEffect" src="vineboom.mp3"></audio>
  <audio id="backgroundMusic" src="polishcow.mp3" loop autoplay></audio>

  <script>
    const backgroundMusic = document.getElementById('backgroundMusic');
    backgroundMusic.volume = 0.6;
    const image = document.getElementById('clickableImage');
    const sound = document.getElementById('soundEffect');

    image.addEventListener('click', () => {
      sound.currentTime = 0;
      sound.play();
    });
  </script>

</body>
</html>
